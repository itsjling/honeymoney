name: Agent task
description: A decision-complete implementation task for a coding agent
title: ""
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include real statements, transaction data, credentials, or other private financial information.
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: State the user-visible or engineering outcome.
      placeholder: After this task, ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Link relevant code, docs, prior issues, or synthetic fixtures.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List observable, testable outcomes.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: exclusions
    attributes:
      label: Out of scope
      description: Name adjacent work the agent must not take on.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Give focused checks in addition to ./scripts/check.sh.
      placeholder: python3 -m unittest tests.test_module
    validations:
      required: true
